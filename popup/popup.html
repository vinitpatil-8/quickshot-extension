<html>

<head>
  <link rel="stylesheet" href="popup.css">
</head>

      <img src="/assets/screenshot.svg" alt="Screenshot">

    <img width="20px" height="20px" src="/assets/settings.svg" alt="settings">
  </button>
  <script src="popup.js"></script>

</html>
